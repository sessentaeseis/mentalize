<!DOCTYPE html>
<html>
<head>
    <title>Perfil</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/app.css">
</head>
<body onload="setActiveNav(); loadProfile(); loadProfileStats()">

<div class="app">

<aside class="sidebar">

    <div class="sidebar-top">
        <img src="img/logo.png" class="logo">
        <span>Mentalize</span>
    </div>

    <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item" id="nav-dashboard">Dashboard</a>
        <a href="historico.html" class="nav-item" id="nav-historico">Histórico</a>
        <a href="conteudos.html" class="nav-item" id="nav-conteudos">Conteúdos</a>
        <a href="perfil.html" class="nav-item" id="nav-perfil">Perfil</a>
    </nav>

    <div class="sidebar-bottom">
        <button onclick="logout()" class="logout-btn">Sair</button>
    </div>

</aside>
    <main class="main">

        <h2>Perfil</h2>

        <div class="profile-grid">
            <div class="app-card">
                <h3>Informações pessoais</h3>
                
                <div class="form-group">
                    <label>Nome</label>
                    <input id="name" type="text" placeholder="Seu nome">
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input id="emailProfile" type="email" disabled>
                </div>
                
                <button class="btn-primary" onclick="saveProfile()">Salvar alterações</button>
            </div>

            <div class="app-card">
                <h3>Estatísticas</h3>
                <div id="profileStats"></div>
            </div>

            <div class="app-card">
                <h3>Configurações</h3>
                <div class="settings-list">
                    <label class="setting-item">
                        <span>Notificações diárias</span>
                        <input type="checkbox" id="notifToggle" onchange="toggleNotifications()">
                    </label>
                    <label class="setting-item">
                        <span>Tema escuro</span>
                        <input type="checkbox" checked disabled>
                    </label>
                </div>
            </div>

            <div class="app-card">
                <h3>Meus dados</h3>
                <button class="btn-ghost-perfil" onclick="exportData()">Exportar dados</button>
                <button class="btn-ghost-perfil" onclick="clearData()" style="color: #ef4444;">Limpar todos os dados</button>
            </div>
        </div>

    </main>

</div>

<script src="js/app.js"></script>
</body>
</html>
